name: Android CI / CD - Clock In Rock

on:
  push:
    branches:
      - main
      - nightly
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build, Sign, and Release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Force Clean Gradle Wrapper
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar
        gradle wrapper --gradle-version 8.10

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Validate Gradle Wrapper
      run: |
        chmod +x ./gradlew
        ./gradlew --version

    - name: Run Build (Debug)
      run: ./gradlew assembleDebug --no-daemon

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: clock-in-rock-apk
        # Use wildcard to find the APK regardless of exact output path
        path: "app/build/outputs/apk/**/*.apk"

    - name: Determine Version Channels and Release Details
      id: get_release_info
      if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'nightly')
      run: |
        if [ "${{ github.ref_name }}" = "nightly" ]; then
          VERSION_NAME=$(jq -r '.versionName' nightly.json)
          IS_PRERELEASE=true
        else
          VERSION_NAME=$(jq -r '.versionName' stable.json)
          IS_PRERELEASE=false
        fi
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "tag_name=v$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
      shell: bash

    - name: Create GitHub Release and Upload APK Asset
      if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'nightly')
      env:
        GH_TOKEN: ${{ github.token }}
        TAG_NAME: ${{ steps.get_release_info.outputs.tag_name }}
        VERSION_NAME: ${{ steps.get_release_info.outputs.version_name }}
        IS_PRERELEASE: ${{ steps.get_release_info.outputs.prerelease }}
      run: |
        # Find signed or unsigned release APK
        RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
        
        if gh release view "$TAG_NAME" >/dev/null 2>&1; then
          gh release upload "$TAG_NAME" "$RELEASE_APK" --clobber
        else
          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG_NAME" "$RELEASE_APK" --title "Clock In Rock $VERSION_NAME" --notes "Release $VERSION_NAME" $PRERELEASE_FLAG
        fi
      shell: bash
